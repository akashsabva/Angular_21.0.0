<h1>Reactive Form using Signal</h1>

<form [formGroup]="formRF" (ngSubmit)="submitFormRF()">
    <input formControlName="nameRF" placeholder="Enter Name">
    <input formControlName="emailRF" placeholder="Enter Email">
    <button type="submit">Submit</button>
</form>
<p>Name: {{ formRF.get('nameRF')?.value }}</p>
<p>Email: {{ formRF.get('emailRF')?.value }}</p>
