<h1>Template Driven Form using Signal</h1>

<form (ngSubmit)="submitForm()">
    <input placeholder="Enter Name" [ngModel]="name()" (ngModelChange)="name.set($event)" name="name">
    <input placeholder="Enter Email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email">
    <button type="submit">Submit</button>
</form>

<p>Name: {{ name() }}</p>
<p>Email: {{ email() }}</p>
